    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#vGold)" stroke-width="3"/>
    <circle cx="0" cy="0" r="41" fill="none" stroke="url(#vShine)" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Stylized G -->
    <path d="M0 -30C-16.6 -30 -30 -16.6 -30 0s13.4 30 30 30c11.6 0 21.8-6.6 26.8-16.5l-10.8-6.3c-3 5.8-9.1 9.8-16 9.8-10 0-18.3-8.3-18.3-18.3s8.3-18.3 18.3-18.3c6.3 0 11.9 3.2 15.1 8.1l10.6-6.6C21 -26.8 11.2 -30 0 -30z" 
          fill="url(#vGold)"/>
    <rect x="-1.5" y="-6" width="25" height="11" rx="2" fill="url(#vGold)"/>
    
  </g>
  
  <!-- GLOBANCE Text -->
  <text x="70" y="130" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="url(#vTextGold)" letter-spacing="3" text-anchor="middle">GLOBANCE</text>
