<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Luxury Gold Gradient -->
    <linearGradient id="ogGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E4BA"/>
      <stop offset="25%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Metallic Gold Shine -->
    <linearGradient id="ogShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#996515"/>
    </linearGradient>
    
    <!-- Text Gold Gradient -->
    <linearGradient id="ogTextGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Inner Shadow for Depth -->
    <radialGradient id="ogCoinDepth" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
  </defs>
  
  <!-- Deep Black Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  
  <!-- Subtle Gold Gradient Overlay -->
  <rect width="1200" height="630" fill="url(#ogGold)" opacity="0.03"/>
  
  <!-- Gold Coin Logo - Centered -->
  <g transform="translate(600, 250)">
    <!-- Outer Coin Ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#ogGold)" stroke-width="6"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#ogShine)" stroke-width="3" opacity="0.7"/>
    
    <!-- Inner Coin Surface -->
    <circle cx="0" cy="0" r="100" fill="url(#ogCoinDepth)" opacity="0.12"/>
    
    <!-- Stylized G Letter -->
    <path d="M0 -75C-41.4 -75 -75 -41.4 -75 0s33.6 75 75 75c29.2 0 54.8-16.7 67.1-41.1l-27.1-15.6c-7.7 14.6-22.9 24.4-40 24.4-25.2 0-45.8-20.6-45.8-45.8s20.6-45.8 45.8-45.8c15.8 0 29.8 8.1 37.9 20.4l26.7-16.6C56.5 -65.4 29.6 -75 0 -75z" 
          fill="url(#ogGold)"/>
    
    <!-- G Horizontal Bar -->
    <rect x="-5" y="-14" width="62" height="27" rx="5" fill="url(#ogGold)"/>
  </g>
  
  <!-- GLOBANCE Text -->
  <text x="600" y="450" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#ogTextGold)" letter-spacing="12" text-anchor="middle">GLOBANCE</text>
  
  <!-- Tagline -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="28" fill="#B8860B" letter-spacing="4" text-anchor="middle" opacity="0.9">PREMIUM CLOUD MINING PLATFORM</text>
  
  <!-- Decorative Gold Lines -->
  <line x1="350" y1="545" x2="500" y2="545" stroke="url(#ogGold)" stroke-width="2" opacity="0.5"/>
  <line x1="700" y1="545" x2="850" y2="545" stroke="url(#ogGold)" stroke-width="2" opacity="0.5"/>
</svg>