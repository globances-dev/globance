    <!-- Primary Meta Tags -->
    <meta name="title" content="Globance - Premium Cloud Mining Platform" />

    <!-- Open Graph / Facebook / Telegram -->
    <meta property="og:type" content="website" />

      content="Globance - Premium Cloud Mining Platform"
    />

    <!-- Telegram WebApp SDK - Load in HEAD for earliest availability -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

  <body>
    <!-- TELEGRAM WEBVIEW ANDROID BACK BUTTON FIX (v6.0+ without BackButton API) -->
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        // Initialize history state for back button interception
        history.pushState({ keyboardLayer: true }, "");

        window.addEventListener("popstate", function (event) {
          var activeElement = document.activeElement;

          // Check if an input or textarea is currently focused
          if (
            activeElement &&
            (activeElement.tagName === "INPUT" ||
              activeElement.tagName === "TEXTAREA")
          ) {
            // 1st back press: Hide keyboard (blur the input)
            activeElement.blur();

            // Restore the history state to prevent actual navigation
            history.pushState({ keyboardLayer: true }, "");

            // Prevent navigation - the next back press will trigger actual navigation
            return;
          }

          // No keyboard is open - allow normal back navigation
          history.back();
        });
      });
    </script>

    <!-- TELEGRAM WEBAPP INITIALIZATION -->
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var tg = window.Telegram && window.Telegram.WebApp;

        if (tg) {
          console.log("[Telegram] WebApp initialized - version:", tg.version);
          tg.ready();
          tg.expand();
        }
      });
    </script>

    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
