[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  ENVIRONMENT = "production"
  DEBUG_MODE = "false"
  VITE_PUBLIC_BUILDER_KEY = "__BUILDER_PUBLIC_KEY__"
  # Tell pnpm to not enforce frozen-lockfile in CI (Netlify)
  pnpm_CI_INSTALL_EXTRA_ARGS = "--no-frozen-lockfile"

# Required environment variables (set in Netlify dashboard):
# - DATABASE_URL: Neon PostgreSQL connection string
# - SENDGRID_API_KEY: SendGrid API key for email service
# - JWT_SECRET: Secret for JWT token signing
# - CRON_SECRET: Secret for CronJob.org mining trigger verification
# - NOWPAYMENTS_API_KEY: NOWPayments integration API key
# - NOWPAYMENTS_IPN_SECRET: NOWPayments webhook verification secret

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"
